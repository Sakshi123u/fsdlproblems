<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weekly Timetable</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Weekly Timetable</h2>

  <table>
    <tr>
      <th>Day</th>
      <th>9-10</th>
      <th>10-11</th>
      <th>11-12</th>
      <th>12-1</th>
    </tr>

    <tr>
      <td>Monday</td>
      <td>Math</td>
      <td>Physics</td>
      <td colspan="2">Lab</td>
    </tr>

    <tr>
      <td>Tuesday</td>
      <td rowspan="2">English</td>
      <td>Chemistry</td>
      <td>Math</td>
      <td>Sports</td>
    </tr>

    <tr>
      <td>Wednesday</td>
      <td colspan="2">Workshop</td>
      <td>Library</td>
    </tr>

    <tr>
      <td>Thursday</td>
      <td>Physics</td>
      <td>Math</td>
      <td>English</td>
      <td>Lab</td>
    </tr>

    <tr>
      <td>Friday</td>
      <td colspan="4">Seminar</td>
    </tr>

  </table>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Blog Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <h1>My Blog</h1>
  </header>

  <div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h3>Categories</h3>
      <ul>
        <li>Technology</li>
        <li>Travel</li>
        <li>Food</li>
        <li>Education</li>
      </ul>
    </aside>

    <!-- Content -->
    <main class="content">
      
      <div class="card">
        <h2>Blog Post Title</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
      </div>

      <div class="card">
        <h2>Another Post</h2>
        <p>More content goes here for your blog.</p>
      </div>

    </main>

  </div>

  <!-- Footer -->
  <footer>
    <p>© 2026 My Blog</p>
  </footer>

</body>
</html>

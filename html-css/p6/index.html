<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Image Gallery</h1>

  <!-- Filter Buttons -->
  <div class="buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('animals')">Animals</button>
  </div>

  <!-- Gallery -->
  <div class="gallery">

    <img src="https://via.placeholder.com/200" class="nature">
    <img src="https://via.placeholder.com/200" class="animals">
    <img src="https://via.placeholder.com/200" class="nature">
    <img src="https://via.placeholder.com/200" class="animals">
    <img src="https://via.placeholder.com/200" class="nature">

  </div>

  <script src="script.js"></script>
</body>
</html>

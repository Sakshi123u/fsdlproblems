<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Previewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- INPUT FORM -->
    <div class="form-box">
      <h2>Enter Details</h2>

      <input type="text" id="nameInput" placeholder="Enter Name">
      <input type="text" id="emailInput" placeholder="Enter Email">
      <textarea id="bioInput" placeholder="Enter Bio"></textarea>
    </div>

    <!-- PROFILE CARD -->
    <div class="profile-card">
      <h2 id="profileName">Your Name</h2>
      <p id="profileEmail">your@email.com</p>
      <p id="profileBio">Your bio will appear here</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>

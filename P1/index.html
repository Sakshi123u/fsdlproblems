<!DOCTYPE html>
<html>
<head>
  <title>HTML Glossary</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>HTML Glossary</h2>

<input type="text" id="search" placeholder="Search for terms...">

<table>
  <tr>
    <th>Tag</th>
    <th>Description</th>
    <th>Example</th>
  </tr>

  <tr>
    <td>&lt;h1&gt;</td>
    <td>Defines heading</td>
    <td>&lt;h1&gt;Heading&lt;/h1&gt;</td>
  </tr>

  <tr>
    <td>&lt;p&gt;</td>
    <td>Defines paragraph</td>
    <td>&lt;p&gt;Text&lt;/p&gt;</td>
  </tr>

  <tr>
    <td>&lt;a&gt;</td>
    <td>Defines link</td>
    <td>&lt;a href="#"&gt;Link&lt;/a&gt;</td>
  </tr>

  <tr>
    <td>&lt;img&gt;</td>
    <td>Defines image</td>
    <td>&lt;img src="img.jpg"&gt;</td>
  </tr>
</table>

<script src="script.js"></script>

</body>
</html>
